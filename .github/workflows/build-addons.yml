name: Build Kodi Add-on Packages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-test.txt

      - name: Auto-bump changed add-on versions
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        id: bump_versions
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python scripts/auto_bump_versions.py

      - name: Update Changelog
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        run: |
          python scripts/update_changelog.py

      - name: Commit version bumps and changelog
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "*/addon.xml" "*/changelog.txt"
          if git diff --cached --quiet; then
            echo "No version bump changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-bump addon versions [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Build add-on archives
        run: |
          # Remove --addons filter to build everything found in the repo
          python build_repo_addons.py --out build/addons --update-index

      - name: Collect build artifacts
        run: |
          mkdir -p upload
          cp addons.xml addons.xml.md5 upload/
          cp -r build/addons/*/ upload/

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodi-addons
          path: upload
          if-no-files-found: error
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: upload
          branch: gh-pages
          clean: true
