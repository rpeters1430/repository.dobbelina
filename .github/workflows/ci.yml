name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Lint with ruff
        run: ruff check plugin.video.cumination tests

  tests:
    runs-on: ubuntu-latest
    needs: lint
    services:
      flaresolverr:
        image: flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
    strategy:
        matrix:
          python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements-test.txt

      - name: Wait for FlareSolverr
        run: |
          echo "Waiting for FlareSolverr to be ready..."
          for i in $(seq 1 30); do
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8191/health 2>/dev/null || echo 000)
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "FlareSolverr is ready (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i/30: health HTTP $HEALTH_STATUS — waiting 5s..."
            sleep 5
          done
          echo "ERROR: FlareSolverr did not become ready in 150s"
          exit 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Compile addon sources
        run: python -m compileall plugin.video.cumination/resources/lib

      - name: Run tests
        run: pytest
