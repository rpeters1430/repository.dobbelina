name: Site Health

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
    env:
      FLARESOLVERR_URL: http://localhost:8191/v1

    services:
      flaresolverr:
        image: flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Wait for FlareSolverr
        run: |
          echo "Waiting for FlareSolverr to be ready..."
          for i in $(seq 1 30); do
            HEALTH_STATUS=$(curl -s -o /tmp/flaresolverr-health -w "%{http_code}" http://localhost:8191/health 2>/dev/null || echo 000)
            API_STATUS=$(curl -s -o /tmp/flaresolverr-api -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d '{"cmd":"sessions.list"}' \
              "$FLARESOLVERR_URL" 2>/dev/null || echo 000)
            if [ "$HEALTH_STATUS" = "200" ] || { [ "$API_STATUS" = "200" ] && grep -q '"sessions"' /tmp/flaresolverr-api; }; then
              echo "FlareSolverr is ready (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i/30: health HTTP $HEALTH_STATUS, api HTTP $API_STATUS — waiting 10s..."
            sleep 10
          done
          echo "ERROR: FlareSolverr did not become ready in 300s"
          echo "Health response:"
          cat /tmp/flaresolverr-health || true
          echo "API response:"
          cat /tmp/flaresolverr-api || true
          exit 1

      - name: Run Tier 1 live smoke
        run: |
          set +e
          python scripts/live_smoke_test.py --tier 1 --out results --require-flaresolverr
          CODE=$?
          set -e
          if [ "$CODE" -eq 2 ]; then
            exit "$CODE"
          fi

      - name: Run remaining live smoke
        run: |
          set +e
          python scripts/live_smoke_test.py --out results --require-flaresolverr
          CODE=$?
          set -e
          if [ "$CODE" -eq 2 ]; then
            exit "$CODE"
          fi

      - name: Prepare previous baseline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          mkdir -p /tmp/site-health
          if git ls-remote --exit-code --heads origin site-health >/dev/null 2>&1; then
            git clone --depth 1 --branch site-health "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/site-health
          else
            git -C /tmp/site-health init
            git -C /tmp/site-health checkout --orphan site-health
            git -C /tmp/site-health remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

      - name: Build site health diff
        run: |
          set -eu
          CURRENT_JSON="$(ls -1t results/live_smoke_*.json | head -n 1)"
          CURRENT_MD="${CURRENT_JSON%.json}.md"
          PREVIOUS_JSON=""
          if [ -f /tmp/site-health/live_smoke_latest.json ]; then
            PREVIOUS_JSON="/tmp/site-health/live_smoke_latest.json"
          fi
          
          STABILITY_IN=""
          if [ -f /tmp/site-health/stability.json ]; then
            STABILITY_IN="/tmp/site-health/stability.json"
          fi

          python scripts/smoke_report_diff.py \
            --current "${CURRENT_JSON}" \
            ${PREVIOUS_JSON:+--previous "${PREVIOUS_JSON}"} \
            ${STABILITY_IN:+--stability-in "${STABILITY_IN}"} \
            --stability-out results/stability.json \
            --json-out results/site_health_diff_latest.json \
            --md-out results/site_health_diff_latest.md

          cp "${CURRENT_JSON}" results/site_health_latest.json
          cp "${CURRENT_MD}" results/site_health_latest.md

      - name: Build site profile audit
        run: |
          CURRENT_JSON="$(ls -1t results/live_smoke_*.json | head -n 1)"
          python scripts/site_profile_audit.py \
            --smoke-report "${CURRENT_JSON}" \
            --json-out results/site_profile_audit_latest.json \
            --md-out results/site_profile_audit_latest.md

      - name: Generate triage requests
        run: |
          python scripts/generate_triage_requests.py \
            --diff results/site_health_diff_latest.json \
            --out results/triage_requests.json

      - name: Ensure site health labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"
            if gh label view "$name" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              return 0
            fi
            gh label create "$name" --color "$color" --description "$description" --repo "${GITHUB_REPOSITORY}"
          }

          ensure_label "site-health" "5319e7" "Automated site health issue"
          ensure_label "site-health/new-failure" "b60205" "Site newly failed in health checks"
          ensure_label "site-health/regression" "d93f0b" "Site health regressed from a healthier state"
          ensure_label "site-health/step-regression" "fbca04" "One site health step regressed"
          ensure_label "site-health/persistent-failure" "cfd3d7" "Failure persisted across health checks"
          ensure_label "failure/network" "006b75" "Network or availability failure"
          ensure_label "failure/parser" "c2e0c6" "Parser or listing extraction failure"
          ensure_label "failure/playback" "f9d0c4" "Playback resolution failure"

      - name: Automated Triage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f results/triage_requests.json ]; then
            echo "No triage requests found."
            exit 0
          fi
          
          COUNT=$(jq 'length' results/triage_requests.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "No regressions to triage."
            exit 0
          fi
          
          echo "Triaging $COUNT regressions..."
          jq -c '.[]' results/triage_requests.json | while read -r req; do
            SITE=$(echo "$req" | jq -r '.site')
            TYPE=$(echo "$req" | jq -r '.type')
            
            if [ "$TYPE" = "REGRESSION" ]; then
              TITLE="[Site Health] Regression: $SITE"
            elif [ "$TYPE" = "STEP_REGRESSION" ]; then
              TITLE="[Site Health] Step Regression: $SITE"
            else
              TITLE="[Site Health] Persistent Failure: $SITE"
            fi
            
            BODY=$(echo "$req" | jq -r '.description')
            LABELS=$(echo "$req" | jq -r '(.labels // ["status/needs-triage","bug"]) | join(",")')
            COMMENT=$(echo "$req" | jq -r '.comment // ""')
            COMMENT_MARKER=$(printf '%s\n' "$COMMENT" | sed -n '1p')
            
            # Check if an open issue already exists
            EXISTING=$(gh issue list --state open --search "$TITLE" --json number --jq '.[0].number')
            if [ -n "$EXISTING" ]; then
              echo "Issue #$EXISTING already exists for $SITE, updating labels/comment if needed."
              gh issue edit "$EXISTING" --add-label "$LABELS"
              if [ -n "$COMMENT" ]; then
                HAS_COMMENT=$(gh issue view "$EXISTING" --json comments --jq --arg marker "$COMMENT_MARKER" '[.comments[].body | contains($marker)] | any')
                if [ "$HAS_COMMENT" != "true" ]; then
                  COMMENT_FILE=$(mktemp)
                  printf '%s\n' "$COMMENT" > "$COMMENT_FILE"
                  gh issue comment "$EXISTING" --body-file "$COMMENT_FILE"
                fi
              fi
              continue
            fi
            
            echo "Creating issue for $SITE..."
            ISSUE_URL=$(gh issue create --title "$TITLE" --body "$BODY" --label "$LABELS")
            ISSUE_NUMBER="${ISSUE_URL##*/}"
            if [ -n "$COMMENT" ]; then
              COMMENT_FILE=$(mktemp)
              printf '%s\n' "$COMMENT" > "$COMMENT_FILE"
              gh issue comment "$ISSUE_NUMBER" --body-file "$COMMENT_FILE"
            fi
          done

      - name: Publish job summary
        run: |
          cat results/site_health_diff_latest.md >> "${GITHUB_STEP_SUMMARY}"
          printf '\n\n' >> "${GITHUB_STEP_SUMMARY}"
          cat results/site_profile_audit_latest.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload site health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site-health
          path: |
            results/site_health_latest.json
            results/site_health_latest.md
            results/site_health_diff_latest.json
            results/site_health_diff_latest.md
            results/site_profile_audit_latest.json
            results/site_profile_audit_latest.md
            results/stability.json
            results/triage_requests.json
            results/live_smoke_*.json
            results/live_smoke_*.md
          if-no-files-found: error
          retention-days: 30

      - name: Persist latest baseline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          cp results/site_health_latest.json /tmp/site-health/live_smoke_latest.json
          cp results/site_health_latest.md /tmp/site-health/live_smoke_latest.md
          cp results/site_health_diff_latest.json /tmp/site-health/site_health_diff_latest.json
          cp results/site_health_diff_latest.md /tmp/site-health/site_health_diff_latest.md
          cp results/site_profile_audit_latest.json /tmp/site-health/site_profile_audit_latest.json
          cp results/site_profile_audit_latest.md /tmp/site-health/site_profile_audit_latest.md
          cp results/stability.json /tmp/site-health/stability.json

          git -C /tmp/site-health config user.name "github-actions[bot]"
          git -C /tmp/site-health config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C /tmp/site-health add .
          if git -C /tmp/site-health diff --cached --quiet; then
            echo "No site health changes to persist."
            exit 0
          fi
          git -C /tmp/site-health commit -m "chore: update site health baseline"
          git -C /tmp/site-health branch -M site-health
          git -C /tmp/site-health push origin site-health
