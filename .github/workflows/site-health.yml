name: Site Health

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          echo "matrix=$(python scripts/generate_smoke_matrix.py)" >> "${GITHUB_OUTPUT}"

  smoke:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      FLARESOLVERR_URL: http://localhost:8191/v1
    services:
      flaresolverr:
        image: flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt
      - name: Install dependencies
        run: pip install -r requirements-test.txt
      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8191/health > /dev/null; then exit 0; fi
            sleep 10
          done
          exit 1
      - name: Run live smoke chunk
        run: |
          set +e
          python scripts/live_smoke_test.py --site ${{ matrix.sites }} --out results --require-flaresolverr
          # Exit code 2 is catastrophic (FS down), otherwise we continue
          if [ $? -eq 2 ]; then exit 2; fi
      - name: Upload chunk results
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ matrix.chunk }}
          path: results/live_smoke_*.json

  report:
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-test.txt
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: smoke-results-*
          merge-multiple: true
      - name: Merge reports
        run: |
          python scripts/merge_smoke_reports.py all-results/live_smoke_*.json --out results/site_health_latest.json
      - name: Prepare previous baseline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/site-health
          if git ls-remote --exit-code --heads origin site-health >/dev/null 2>&1; then
            git clone --depth 1 --branch site-health "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/site-health
          else
            git -C /tmp/site-health init
            git -C /tmp/site-health checkout --orphan site-health
            git -C /tmp/site-health remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
      - name: Build site health diff
        run: |
          PREVIOUS_JSON=""
          if [ -f /tmp/site-health/live_smoke_latest.json ]; then PREVIOUS_JSON="/tmp/site-health/live_smoke_latest.json"; fi
          STABILITY_IN=""
          if [ -f /tmp/site-health/stability.json ]; then STABILITY_IN="/tmp/site-health/stability.json"; fi

          python scripts/smoke_report_diff.py \
            --current results/site_health_latest.json \
            ${PREVIOUS_JSON:+--previous "${PREVIOUS_JSON}"} \
            ${STABILITY_IN:+--stability-in "${STABILITY_IN}"} \
            --stability-out results/stability.json \
            --json-out results/site_health_diff_latest.json \
            --md-out results/site_health_diff_latest.md
      - name: Build site profile audit
        run: |
          python scripts/site_profile_audit.py \
            --smoke-report results/site_health_latest.json \
            --json-out results/site_profile_audit_latest.json \
            --md-out results/site_profile_audit_latest.md
      - name: Generate triage requests
        run: |
          python scripts/generate_triage_requests.py \
            --diff results/site_health_diff_latest.json \
            --out results/triage_requests.json
      - name: Ensure labels and Triage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ensure_labels.py
          python scripts/automate_triage.py --requests results/triage_requests.json
      - name: Publish job summary
        run: |
          cat results/site_health_diff_latest.md >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          cat results/site_profile_audit_latest.md >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload site health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site-health-final
          path: results/
      - name: Persist latest baseline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp results/site_health_latest.json /tmp/site-health/live_smoke_latest.json
          cp results/site_health_latest.md /tmp/site-health/live_smoke_latest.md
          cp results/site_health_diff_latest.json /tmp/site-health/site_health_diff_latest.json
          cp results/site_health_diff_latest.md /tmp/site-health/site_health_diff_latest.md
          cp results/site_profile_audit_latest.json /tmp/site-health/site_profile_audit_latest.json
          cp results/site_profile_audit_latest.md /tmp/site-health/site_profile_audit_latest.md
          cp results/stability.json /tmp/site-health/stability.json

          git -C /tmp/site-health config user.name "github-actions[bot]"
          git -C /tmp/site-health config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C /tmp/site-health add .
          if git -C /tmp/site-health diff --cached --quiet; then exit 0; fi
          git -C /tmp/site-health commit -m "chore: update site health baseline"
          git -C /tmp/site-health push origin site-health
